function showSection(id){

  document
    .querySelectorAll(".app-section")
    .forEach(section => {

      section.classList.add(
        "hidden-section"
      );

    });

  document
    .getElementById(id)
    .classList.remove(
      "hidden-section"
    );

  document
    .querySelectorAll(".nav-button")
    .forEach(button => {

      button.classList.remove(
        "active-nav"
      );

    });

  document
    .querySelector(
      `[data-section="${id}"]`
    )
    .classList.add(
      "active-nav"
    );

}

function renderSeasonClock(){

  const now = new Date();

  const year =
    now.getFullYear();

  const month =
    now.getMonth();

  const monthNames = [

    "JANUARY",
    "FEBRUARY",
    "MARCH",
    "APRIL",
    "MAY",
    "JUNE",
    "JULY",
    "AUGUST",
    "SEPTEMBER",
    "OCTOBER",
    "NOVEMBER",
    "DECEMBER"

  ];

  const end =
    new Date(year, month + 1, 0);

  const totalDays =
    end.getDate();

  const currentDay =
    now.getDate();

  const daysLeft =
    totalDays - currentDay;

  const percent =
    Math.round(
      (currentDay / totalDays) * 100
    );

  document.getElementById(
    "seasonName"
  ).innerHTML = `

    ${monthNames[month]}
    ${year}

  `;

  document.getElementById(
    "seasonDaysLeft"
  ).innerHTML = `

    ${daysLeft} DAYS LEFT

  `;

  document.getElementById(
    "seasonPercent"
  ).innerHTML = `

    ${percent}% COMPLETE

  `;

  document.getElementById(
    "seasonProgressFill"
  ).style.width =
    `${percent}%`;

}

function getEloChange(stake, isWinner){

  const base =
    Number(stake || 1) * 2;

  return isWinner
    ? `+${base}`

function getAchievementProgress(

  achievementId,
  playerName,
  context

){

    leagueData.players.find(
      p => p.name === playerName

  if(!player){

    return {
      current:0,

    /* =========================

      };

/* =========================

========================= */

case "HOT_STREAK":

      )

case "RED_HOT":

function unlockedAchievement(

  achievementId
){

  return (player.achievements || [])

/* =========================
   ACHIEVEMENT SCORE
========================= */

function getAchievementScore(
  achievementIds
){

  const metadata =
leagueData
  .allAchievements || [];

  let score = 0;

  achievementIds.forEach(id => {

    const achievement =
      metadata.find(
        a => a.id === id
      );

    if(!achievement)
      return;

    switch(
      String(
        achievement.rarity || ''
      ).toLowerCase()
    ){

      case 'common':
        score += 5;
        break;

      case 'rare':
        score += 15;
        break;

      case 'epic':
        score += 35;
        break;

      case 'legendary':
        score += 75;
        break;

      default:
        score += 5;

    }

  });

  return score;

}

/* =========================
   PRESTIGE LEVELS
========================= */

function getPrestigeLevel(score){

  if(score >= 600)
    return 'MYTHIC';

  if(score >= 350)
    return 'LEGEND';

  if(score >= 200)
    return 'MASTER';

  if(score >= 100)
    return 'ELITE';

  if(score >= 40)
    return 'RISING';

  return 'ROOKIE';

}

function filterAchievements(

function animateCountUps(){

  const counters =
    document.querySelectorAll('.count-up');

  counters.forEach(counter => {

    const target =
      Number(
        counter.textContent
          .replace(/[^0-9]/g,'')
      );

    if(isNaN(target)) return;

    let current = 0;

    const increment =
      Math.max(
        1,
        Math.ceil(target / 40)
      );

    counter.textContent = '0';

    const timer = setInterval(() => {

      current += increment;

      if(current >= target){

        counter.textContent = target;

        clearInterval(timer);

      }else{

        counter.textContent = current;

      }

    }, 18);

  });

}
