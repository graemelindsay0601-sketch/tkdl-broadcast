<style>

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@400;500;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  color:white;

background:

  linear-gradient(
    rgba(4,4,10,0.82),
    rgba(4,4,10,0.90)
  ),

  url("https://i.postimg.cc/Bbf9fbrp/pdc1.jpg");

background-size:cover;

background-position:center;

background-attachment:fixed;

background-size:
  cover;

background-position:
  center;

background-attachment:
  fixed;
  position:relative;

  min-height:100vh;

overflow-x:hidden;

}




body::before,
body::after{

  content:"";

  position:fixed;

  width:520px;
  height:520px;

  border-radius:50%;

  filter:blur(120px);

  opacity:0.22;

  pointer-events:none;

  z-index:-1;

}

body::before{

  top:-120px;
  left:-120px;

  background:
    rgba(255,0,60,0.45);

  animation:
    ambientFloat1 14s ease-in-out infinite;

}

body::after{

  bottom:-160px;
  right:-120px;

  background:
    rgba(0,102,255,0.42);

  animation:
    ambientFloat2 18s ease-in-out infinite;

}

@keyframes ambientFloat1{

  0%{

    transform:
      translate(0,0)
      scale(1);

  }

  50%{

    transform:
      translate(40px,30px)
      scale(1.08);

  }

  100%{

    transform:
      translate(0,0)
      scale(1);

  }

}

@keyframes heroRotate{

  from{

    transform:
      rotate(0deg);

  }

  to{

    transform:
      rotate(360deg);

  }

}

@keyframes ambientFloat2{

  0%{

    transform:
      translate(0,0)
      scale(1);

  }

  50%{

    transform:
      translate(-40px,-20px)
      scale(1.06);

  }

  100%{

    transform:
      translate(0,0)
      scale(1);

  }

}

/* =========================
   APP
========================= */

.app-container{

  width:100%;
  max-width:1400px;

  position:relative;

  padding-bottom:120px;

}

/* =========================
   HEADER
========================= */

.top-header{

  position:sticky;
  top:0;

  z-index:999;

  backdrop-filter:blur(16px);

  background:
    rgba(0,0,0,0.72);

  border-bottom:
    1px solid
    rgba(255,255,255,0.08);

}

.header-content{

  padding:22px;

}

.league-title{

  font-family:'Oswald',sans-serif;

  font-size:42px;

  font-weight:700;

  letter-spacing:3px;

  color:#ffffff;

  text-shadow:
    0 0 18px
    rgba(255,0,60,0.55);

}

.league-subtitle{

  margin-top:4px;

  opacity:0.75;

  font-size:14px;

  letter-spacing:1px;

}

/* =========================
   MAIN
========================= */

.main-content{

  padding:
    28px 22px 140px;

  max-width:1480px;

  margin:0 auto;

}

.hidden-section{

  display:none;

  opacity:0;

  transform:
    translateY(10px);

}


.app-section{

  animation:
    sectionFade 0.35s ease;

}

@keyframes sectionFade{

  from{

    opacity:0;

    transform:
      translateY(10px);

  }

  to{

    opacity:1;

    transform:
      translateY(0);

  }

}



/* =========================
   STATUS STRIP
========================= */

.status-strip{

  position:relative;

  overflow:hidden;

  margin-bottom:18px;

  border-radius:18px;

  background:
    linear-gradient(
      90deg,
      rgba(255,0,60,0.12),
      rgba(0,102,255,0.12)
    );

  border:
    1px solid
    rgba(255,255,255,0.06);

  backdrop-filter:
    blur(14px);

}

.status-strip::before{

  content:"";

  position:absolute;

  inset:0;

  background:

    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.05),
      transparent
    );

  animation:
    tickerGlow 5s linear infinite;

}

.status-track{

  display:flex;

  gap:46px;

  padding:14px 24px;

  white-space:nowrap;

  font-size:13px;

  font-weight:700;

  letter-spacing:1px;

  animation:
    tickerMove 22s linear infinite;

}

@keyframes tickerMove{

  from{

    transform:
      translateX(0);

  }

  to{

    transform:
      translateX(-20%);

  }

}

@keyframes tickerGlow{

  from{

    transform:
      translateX(-100%);

  }

  to{

    transform:
      translateX(100%);

  }

}


/* =========================
   HERO
========================= */

.live-hero{
  transform-style:preserve-3d;
  min-height:420px;
  position:relative;

  display:grid;

  grid-template-columns:
    1.7fr 0.72fr;

  gap:20px;

  margin-bottom:34px;

  align-items:stretch;

}

.live-hero-left,
.live-hero-right{

  transform:translateZ(0px);

  overflow:hidden;

  position:relative;

  overflow:hidden;

border-radius:34px;

  padding:28px;

  background:
    linear-gradient(
      135deg,
      rgba(20,20,28,0.94),
      rgba(8,8,12,0.94)
    );

  border:
    1px solid
    rgba(255,255,255,0.06);

box-shadow:

  0 30px 70px
  rgba(0,0,0,0.34),

  inset 0 1px 0
  rgba(255,255,255,0.04);

}

.live-hero::after{

  content:"";

  position:absolute;

  left:50%;
  top:10%;

  width:1px;
  height:80%;

  background:

    linear-gradient(
      180deg,
      transparent,
      rgba(255,255,255,0.10),
      transparent
    );

  transform:
    translateX(-50%);

}

.live-hero-left::before,
.live-hero-right::before{

  content:"";

  position:absolute;

  width:420px;

  height:420px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(255,140,0,0.14),
      transparent 70%
    );

  top:-180px;

  right:-120px;

  pointer-events:none;

}

.live-hero-left::before{

  content:"TKDL";

  position:absolute;

  right:-10px;
  bottom:-40px;

  font-family:'Oswald',sans-serif;

  

font-size:150px;

  font-weight:800;

  line-height:1;

  letter-spacing:4px;

color:
rgba(255,255,255,0.045);
filter:blur(1px);
  pointer-events:none;

}

.live-hero-left::after{
  mix-blend-mode:screen;
  opacity:0.65;

  content:"";

  position:absolute;

  inset:-20%;

  background:

    conic-gradient(
      from 0deg,
      rgba(255,0,60,0.12),
      transparent,
      rgba(0,102,255,0.10),
      transparent,
      rgba(255,0,60,0.12)
    );

animation:
  heroRotate 28s linear infinite;

  pointer-events:none;

}

@keyframes pulseCore{

  0%{
    transform:
      translate(-50%,-50%)
      scale(1);
  }

  50%{
    transform:
      translate(-50%,-50%)
      scale(1.08);
  }

  100%{
    transform:
      translate(-50%,-50%)
      scale(1);
  }

}

.live-hero-left .hero-core-glow{

  position:absolute;

  left:50%;
  top:50%;

  width:420px;
  height:420px;

  border-radius:50%;

  background:

    radial-gradient(
      circle,
      rgba(255,0,80,0.18),
      rgba(0,102,255,0.10),
      transparent 70%
    );

  transform:
    translate(-50%,-50%);

  filter:blur(30px);

  pointer-events:none;

  animation:
    pulseCore 7s ease-in-out infinite;

}

.hero-center-mark{

  position:absolute;

  left:50%;
  top:50%;

  transform:
    translate(-50%,-50%);

  font-family:'Oswald',sans-serif;

  font-size:150px;

  font-weight:800;

  letter-spacing:10px;

  color:
    rgba(255,255,255,0.045);

  text-transform:uppercase;

  pointer-events:none;

  z-index:0;

  opacity:0.7;
  filter:blur(1px);

}


.live-badge{

  position:relative;

  display:inline-flex;

  align-items:center;

  gap:8px;

  padding:
    8px 14px;

  border-radius:999px;

  background:
    rgba(255,0,60,0.16);

  color:#ff4b75;

  font-size:12px;

  font-weight:700;

  letter-spacing:1px;

}

.hero-title{

  display:flex;
  flex-direction:column;

}

.hero-title span{

  margin-top:12px;

  font-size:15px;

  letter-spacing:8px;

  opacity:0.72;

  font-weight:700;

  opacity:0.55;

  color:white;

  -webkit-text-fill-color:white;

}

.hero-title{

  position:relative;

  margin-top:26px;

  font-family:'Oswald',sans-serif;

font-size:92px;

line-height:0.82;

letter-spacing:-3px;

  font-weight:800;

  background:
    linear-gradient(
      180deg,
      #ffffff,
      #d7d7d7
    );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

text-shadow:
  0 0 24px
  rgba(255,255,255,0.12);



}

.hero-subtitle{

  position:relative;

  margin-top:18px;

  max-width:620px;

  font-size:18px;

  line-height:1.7;

  opacity:0.72;

  letter-spacing:0.3px;

}

.hero-leader-card{

  max-width:340px;

  overflow:hidden;

backdrop-filter:blur(20px);

box-shadow:

  0 20px 40px
  rgba(0,0,0,0.24),

  inset 0 1px 0
  rgba(255,255,255,0.08);

  position:relative;

  margin-top:34px;

  transform:translateY(12px);

  width:320px;

  padding:22px;

  border-radius:22px;

  background:
    rgba(255,255,255,0.05);

  border:
    1px solid
    rgba(255,255,255,0.06);

}

.hero-leader-card::before{

  content:"";

  position:absolute;

  inset:0;

  background:

    linear-gradient(
      135deg,
      rgba(255,255,255,0.10),
      transparent 45%
    );

  pointer-events:none;

}

.hero-label{

  font-size:12px;

  letter-spacing:1px;

  opacity:0.65;

}

.hero-player-name{

  margin-top:14px;

  font-size:34px;

  font-weight:700;

}

.hero-player-points{

  margin-top:10px;

  color:#ffd24a;

  font-weight:700;

  font-size:18px;

}

/* =========================
   FEATURED CARD
========================= */

    rgba(255,255,255,0.05);

  text-shadow:
    0 0 24px
    rgba(255,255,255,0.05);

}
.featured-label{

  font-size:12px;

  letter-spacing:1px;

  opacity:0.7;

}

.featured-players{

  position:relative;

  margin-top:18px;

  font-family:'Oswald',sans-serif;

  font-size:56px;

  font-weight:800;

    linear-gradient(

      #d9dfe8
    );

  -webkit-text-fill-color:transparent;

  text-shadow:

    0 0 18px
    rgba(255,255,255,0.08);

}
.featured-meta{
  display:flex;

  margin-top:18px;
flex-direction:column;
gap:10px;

}

.featured-stat{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:10px 0;

  border-bottom:
    1px solid
    rgba(255,255,255,0.06);

}

.featured-stat:last-child{

  border-bottom:none;

}

.featured-stat-label{

  opacity:0.6;

  font-size:13px;

}

.featured-stat-value{

}

.featured-type{

  margin-top:26px;

  display:inline-block;

  padding:

    rgba(255,255,255,0.08);

  font-weight:700;

}

/* =========================
   STATS
========================= */

.stats-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:18px;

  margin-bottom:24px;

}

.stats-card{

  padding:24px;

  border-radius:22px;

  background:
    rgba(15,15,20,0.92);

  border:
    1px solid
    rgba(255,255,255,0.05);

}

.stats-card span{

  display:block;

  font-size:12px;

  opacity:0.65;

  letter-spacing:1px;

}

.stats-card strong{

  display:block;

  margin-top:12px;

  font-size:34px;

}

/* =========================
   SECTION CARD
========================= */

.section-card{

  position:relative;

  overflow:hidden;

margin-bottom:22px;

padding:24px;

border-radius:30px;

  background:
    linear-gradient(
      145deg,
      rgba(18,18,26,0.94),
      rgba(8,8,12,0.96)
    );

  border:
    1px solid
    rgba(255,255,255,0.06);

  box-shadow:

  0 14px 34px
  rgba(0,0,0,0.34),

  0 0 24px
  rgba(255,255,255,0.025);

  backdrop-filter:
    blur(14px);

}


.section-card::before{

  content:"";

  position:absolute;
  inset:0;

  background:

    radial-gradient(
      circle at top right,
      rgba(255,0,60,0.08),
      transparent 30%
    ),

    radial-gradient(
      circle at bottom left,
      rgba(0,102,255,0.08),
      transparent 30%
    );

  pointer-events:none;

}


.section-card h2{

  margin-bottom:20px;

  font-family:'Oswald',sans-serif;

  font-size:30px;

  font-weight:700;

  letter-spacing:1px;

  opacity:0.92;

}



/* =========================
   LEAGUE TABLE
========================= */

.league-table{

  width:100%;

}

.table-header{

  position:sticky;

  top:90px;

  z-index:50;

  display:grid;

grid-template-columns:
  55px
  70px
  1.8fr
  65px
  65px
  80px
  80px
  90px;

  padding:14px 18px;

  border-radius:18px;

  background:
    rgba(255,255,255,0.04);

  backdrop-filter:
    blur(12px);

  font-size:11px;

  font-weight:700;

  letter-spacing:1px;

  opacity:0.72;

}

.table-row{

  position:relative;

  overflow:hidden;

  display:grid;

  align-items:center;

grid-template-columns:
  55px
  70px
  1.8fr
  65px
  65px
  80px
  80px
  90px;

  margin-top:10px;

padding:12px 16px;

  border-radius:18px;

  background:
    linear-gradient(
      145deg,
      rgba(18,18,26,0.96),
      rgba(8,8,12,0.96)
    );

  border:
    1px solid
    rgba(255,255,255,0.06);

  backdrop-filter:
    blur(18px);

  box-shadow:
    0 8px 18px
    rgba(0,0,0,0.22);

  cursor:pointer;

  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease,
    border 0.18s ease;

}
.table-row::before{

  content:"";

  position:absolute;
  inset:0;

  background:

    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.04),
      transparent
    );

  opacity:0;

  transition:
    opacity 0.25s ease;

}

.table-row:hover{

  transform:
    translateY(-2px);


  border:
    1px solid
    rgba(255,0,60,0.22);

box-shadow:

  0 14px 28px rgba(255,0,60,0.10),

  0 0 24px rgba(255,255,255,0.04);

}

.table-row:hover::before{

  opacity:1;

}

.rank-1{

  position:relative;

  border:
    1px solid
    rgba(255,215,0,0.42);

  background:
    linear-gradient(
      135deg,
      rgba(255,215,0,0.12),
      rgba(255,255,255,0.03)
    );

  box-shadow:
    0 0 28px
    rgba(255,215,0,0.16);

    leaderPulse 3s ease-in-out infinite;

}

  }

  50%{

    box-shadow:
      0 0 42px

  }

  100%{

      0 0 24px
      rgba(255,215,0,0.14);

  }

}




.rank-2{

    1px solid
    rgba(220,220,220,0.30);

    linear-gradient(
      135deg,

  opacity:0.92;

}





.table-player-name{

  position:relative;

  font-family:'Oswald',sans-serif;

font-size:21px;

  line-height:1;

  letter-spacing:1px;

  font-weight:700;

  text-transform:uppercase;

}

.table-player-tier{

  display:inline-flex;

  margin-top:8px;

  border-radius:999px;

  font-size:11px;

  font-weight:700;

  letter-spacing:1px;

  text-transform:uppercase;

  backdrop-filter:
    blur(10px);

.rank-1 .table-player-tier{

  background:
    linear-gradient(
      135deg,
