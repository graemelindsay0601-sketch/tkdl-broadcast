function showSection(id){

  document
    .querySelectorAll(".app-section")
    .forEach(section => {

      section.classList.add(
        "hidden-section"
      );

    });

  document
    .getElementById(id)
    .classList.remove(
      "hidden-section"
    );

  document
    .querySelectorAll(".nav-button")
    .forEach(button => {

      button.classList.remove(
        "active-nav"
      );

    });

  document
    .querySelector(
      `[data-section="${id}"]`
    )
    .classList.add(
      "active-nav"
    );

}

function renderSeasonClock(){

  const now = new Date();

  const year =
    now.getFullYear();

  const month =
    now.getMonth();

  const monthNames = [

    "JANUARY",
    "FEBRUARY",
    "MARCH",
    "APRIL",
    "MAY",
    "JUNE",
    "JULY",
    "AUGUST",
    "SEPTEMBER",
    "OCTOBER",
    "NOVEMBER",
    "DECEMBER"

  ];

  const end =
    new Date(year, month + 1, 0);

  const totalDays =
    end.getDate();

  const currentDay =
    now.getDate();

  const daysLeft =
    totalDays - currentDay;

  const percent =
    Math.round(
      (currentDay / totalDays) * 100
    );

  document.getElementById(
    "seasonName"
  ).innerHTML = `

    ${monthNames[month]}
    ${year}

  `;

  document.getElementById(
    "seasonDaysLeft"
  ).innerHTML = `

    ${daysLeft} DAYS LEFT

  `;

  document.getElementById(
    "seasonPercent"
  ).innerHTML = `

    ${percent}% COMPLETE

  `;

  document.getElementById(
    "seasonProgressFill"
  ).style.width =
    `${percent}%`;

}

function getEloChange(stake, isWinner){

  const base =
    Number(stake || 1) * 2;

  return isWinner
    ? `+${base}`
    : `-${base}`;

}

function openPlayerProfile(name){

  const players =
    leagueData.players || [];

  const player =
    players.find(p =>
      p.name === name
    );

const winRate =
  player.games > 0

    ? Math.round(
        (player.wins / player.games) * 100
      )

    : 0;

const bestRank =
  player.bestRank || player.rank;

const eliminated =
  player.rank >= 8;

    const recentMatches =
  (leagueData.recentMatches || [])
    .filter(match =>

      (match.match || "")
        .toLowerCase()
        .includes(
          name.toLowerCase()
        )

    )
    .slice(0,5);

const formResults =
  recentMatches.map(match => {

    return (
      match.winner &&
      match.winner
        .toLowerCase()
        ===
      name.toLowerCase()
    )

      ? "W"

      : "L";

  });

const currentStreak = (() => {

  if(!formResults.length)
    return null;

  const first =

function getAchievementProgress(
  player,
  achievement
){

  const type =
    String(
      achievement.criteriaType || ""
    ).toUpperCase();

  const secondaryType =
    String(
      achievement.secondaryCriteriaType || ""
    ).toUpperCase();

  const target =
    Number(
      achievement.criteriaValue || 1
    );

  const secondaryTarget =
    Number(
      achievement.secondaryCriteriaValue || 0
    );

  let current = 0;

  let secondaryCurrent = 0;

  /* =========================
     PRIMARY CRITERIA
  ========================= */

  switch(type){

    case "CAREER_WINS":

      current =
        player.career?.wins || 0;

      break;

    case "CAREER_LOSSES":

      current =
        player.career?.losses || 0;

      break;

    case "CAREER_GAMES":

      current =
        player.career?.games || 0;

      break;

    case "CAREER_POINTS":

      current =
        player.career?.points || 0;

      break;

    case "SEASON_WINS":

      current =
        player.wins || 0;

      break;

    case "SEASON_LOSSES":

      current =
        player.losses || 0;

      break;

    case "SEASON_GAMES":

      current =
        player.games || 0;

      break;

    case "POINTS":

    case "SEASON_POINTS":

      current =
        player.points || 0;

      break;

    case "WIN_RATE":

    case "WIN_RATE_AFTER_50":

      current =
        player.career?.winRate || 0;

      break;

    case "ELO":

      current =
        player.elo || 0;

      break;

    case "CURRENT_RANK":

      current =
        player.rank
          ? (
              leagueData.players.length
              - player.rank
              + 1
            )
          : 0;

      break;

    case "BEST_RANK":

      current =
        player.bestRank ||
        player.rank ||
        0;

      break;

    case "TOTAL_ACHIEVEMENTS":

    case "ACHIEVEMENTS":

      current =
        player.achievements?.length || 0;

      break;

    case "MATCH_STREAK":

    case "UNBEATEN_STREAK":

      current =
        player.bestStreak || 0;

      break;

    case "LOSS_STREAK":

      current =
        player.worstStreak || 0;

      break;

    case "ELIMINATIONS":

      current =
        player.eliminations || 0;

      break;

    case "TOP_PLAYER_WINS":

      current =
        player.topPlayerWins || 0;

      break;

    case "ELIMINATE_TOP_PLAYER":

      current =
        player.topPlayerElims || 0;

      break;

    case "SAME_PLAYER_WINS":

      current =
        player.samePlayerWinStreak || 0;

      break;

    case "RIVAL_WINS":

      current =
        player.rivalWins || 0;

      break;

    case "HIGH_STAKE_MATCHES":

      current =
        player.highStakeMatches || 0;

      break;

    case "SINGLE_MATCH_STAKE":

      current =
        player.highestStakeWin || 0;

      break;

    case "ACTIVE_SEASONS":

      current =
        player.activeSeasons || 0;

      break;

    case "SEASONS_WON":

      current =
        player.seasonsWon || 0;

      break;

    case "TIER_REACHED":

      const tier =
        String(player.tier || "")
          .toUpperCase();

      const targetTier =
        String(target || "")
          .toUpperCase();

      const tierOrder = {

        BRONZE:1,
        SILVER:2,
        GOLD:3

      };

      current =
        (tierOrder[tier] || 0) >=
        (tierOrder[targetTier] || 0)

          ? 1
          : 0;

      break;

    case "RANK_CLIMB":

      current =
        player.biggestRankClimb || 0;

      break;

    case "RANK_DROP":

      current =
        player.biggestRankDrop || 0;

      break;

    case "MOST_MATCHES_SEASON":

      current =
        player.games || 0;

      break;

    case "MOST_ELIMS_SEASON":

      current =
        player.eliminations || 0;

      break;

    case "SEASON_MVP":

      current =
        player.mvpAwards || 0;

      break;

    case "FIRST_SEASON_TOP3":

      current =
        player.firstSeasonTop3
          ? 1
          : 0;

      break;

    case "TOP3_FULL_SEASON":

      current =
        player.top3FullSeason
          ? 1
          : 0;

      break;

    case "PERFECT_SEASON":

      current =
        player.perfectSeason
          ? 1
          : 0;

      break;

    case "FINAL_SURVIVOR":

      current =
        player.finalSurvivor
          ? 1
          : 0;

      break;

    case "ALL_HIDDEN_UNLOCKED":

      current =
        player.hiddenAchievementsUnlocked || 0;

      break;

    default:

      current = 0;

  }

  /* =========================
     SECONDARY CRITERIA
  ========================= */

  switch(secondaryType){

    case "CAREER_GAMES":

      secondaryCurrent =
        player.career?.games || 0;

      break;

    case "SEASON_GAMES":

      secondaryCurrent =
        player.games || 0;

      break;

    case "CAREER_WINS":

      secondaryCurrent =
        player.career?.wins || 0;

      break;

    default:

      secondaryCurrent =
        secondaryTarget;

  }

  /* =========================
     SECONDARY REQUIREMENT
  ========================= */

  const secondaryMet =

    secondaryCurrent >=
    secondaryTarget;

  /* =========================
     FINAL %
  ========================= */

  const percent =

    secondaryMet

      ?

      Math.min(
        100,
        Math.round(
          (current / target) * 100
        )
      )

      :

      0;

  return {

    current,

    target,

    secondaryCurrent,

    secondaryTarget,

    secondaryMet,

    percent

  };

}





function animateCountUps(){

  const counters =
    document.querySelectorAll('.count-up');

  counters.forEach(counter => {

    const target =
      Number(
        counter.textContent
          .replace(/[^0-9]/g,'')
      );

    if(isNaN(target)) return;

    let current = 0;

    const increment =
      Math.max(
        1,
        Math.ceil(target / 40)
      );

    counter.textContent = '0';

    const timer = setInterval(() => {

      current += increment;

      if(current >= target){

        counter.textContent = target;

        clearInterval(timer);

      }else{

        counter.textContent = current;

      }

    }, 18);

  });

}

function generateLeagueNarratives(){

  const players =
    leagueData.players || [];

  if(!players.length){
    return [];
  }

  const leader = players[0];

  const second = players[1];

  const hottest =
    [...players]
      .sort((a,b)=>
        (b.wins - b.losses) -
        (a.wins - a.losses)
      )[0];

  const danger =
    [...players]
      .filter(p => p.rank >= 6)
      .sort((a,b)=>b.rank-a.rank)[0];

  const narratives = [];

  if(leader && second){

    const gap =
      Math.abs(
        (leader.points || 0) -
        (second.points || 0)
      );

    if(gap <= 3){

      narratives.push({
        icon:'🔥',
        type:'tight',
        text:`Title race tightening — only ${gap} points separate ${leader.name} and ${second.name}.`
      });

    }

  }

  if(hottest?.wins >= 3){

    narratives.push({
      icon:'⚡',
      type:'surge',
      text:`${hottest.name} is surging through the standings after a strong recent run.`
    });

  }

  if(danger){

    narratives.push({
      icon:'☠️',
      type:'danger',
      text:`${danger.name} is dangerously close to elimination territory.`
    });

  }

  narratives.push({
    icon:'🏆',
    type:'leader',
    text:`${leader.name} currently leads the TKDL standings.`
  });

  return narratives.slice(0,4);

}

function renderSeasonClock(){

  const now = new Date();

  const year =
    now.getFullYear();

  const month =
    now.getMonth();

  const monthNames = [

    "JANUARY",
    "FEBRUARY",
    "MARCH",
    "APRIL",
    "MAY",
    "JUNE",
    "JULY",
    "AUGUST",
    "SEPTEMBER",
    "OCTOBER",
    "NOVEMBER",
    "DECEMBER"

  ];

  const end =
    new Date(year, month + 1, 0);

  const totalDays =
    end.getDate();

  const currentDay =
    now.getDate();

  const daysLeft =
    totalDays - currentDay;

  const percent =
    Math.round(
      (currentDay / totalDays) * 100
    );

  document.getElementById(
    "seasonName"
  ).innerHTML = `

    ${monthNames[month]}
    ${year}

  `;

  document.getElementById(
    "seasonDaysLeft"
  ).innerHTML = `

    ${daysLeft} DAYS LEFT

  `;

  document.getElementById(
    "seasonPercent"
  ).innerHTML = `

    ${percent}% COMPLETE

  `;

  document.getElementById(
    "seasonProgressFill"
  ).style.width =
    `${percent}%`;

}

function closePlayerProfile(){

  document

function openAchievementsModal(playerName){

  const player =
    leagueData.players.find(
      p => p.name === playerName
    );

  if(!player){
    return;
  }

  const allAchievements =
    leagueData.achievementMetadata || [];

  const unlockedIds =
    (player.achievements || [])
      .map(a => a.id);

  document
    .getElementById("player-modal")
    .innerHTML = `

    <div class="modal-backdrop"
      onclick="closePlayerProfile()">

      <div class="player-modal achievement-modal"
        onclick="event.stopPropagation()">

        <button
          class="close-modal"
          onclick="closePlayerProfile()">

          ✕

        </button>

        <h2>

          🏆 ACHIEVEMENTS

        </h2>

        <div class="achievement-full-grid">

          ${allAchievements.map(a => {

            const unlocked =
              unlockedIds.includes(a.id);

            const progress =
              getAchievementProgress(
                player,
                a
              );

            return `

              <div class="
                achievement-card
                ${unlocked
                  ? ''
                  : 'locked-achievement'}
              ">

                <div class="achievement-icon">

                  ${unlocked
                    ? a.icon
                    : '🔒'}

                </div>

                <div class="achievement-name">

                  ${a.name}

                </div>

                <div class="achievement-rarity">

                  ${a.rarity}

                </div>

                <div class="achievement-description">

                  ${a.description || ""}

                </div>

                <div class="achievement-progress-bar">

                  <div
                    class="achievement-progress-fill"
                    style="
                      width:${progress.percent}%;
                    ">

                  </div>

                </div>

                <div class="achievement-progress-text">

                  ${progress.current}
                  /
                  ${progress.target}

                </div>

              </div>

            `;

          }).join("")}

        </div>

      </div>

    </div>

  `;

}

function getAchievementProgress(
  player,
  achievement
){

  const type =
    String(
      achievement.criteriaType || ""
    ).toUpperCase();

  const secondaryType =
    String(
      achievement.secondaryCriteriaType || ""
    ).toUpperCase();

  const target =
    Number(
      achievement.criteriaValue || 1
    );

  const secondaryTarget =
    Number(
      achievement.secondaryCriteriaValue || 0
    );

  let current = 0;

  let secondaryCurrent = 0;

  /* =========================
     PRIMARY CRITERIA
  ========================= */

  switch(type){

    case "CAREER_WINS":

      current =
        player.career?.wins || 0;

      break;

    case "CAREER_LOSSES":

      current =
        player.career?.losses || 0;

      break;

    case "CAREER_GAMES":

      current =
        player.career?.games || 0;

      break;

    case "CAREER_POINTS":

      current =
        player.career?.points || 0;

      break;

    case "SEASON_WINS":

      current =
        player.wins || 0;

      break;

    case "SEASON_LOSSES":

      current =
        player.losses || 0;

      break;

    case "SEASON_GAMES":

      current =
        player.games || 0;

      break;

    case "POINTS":

    case "SEASON_POINTS":

      current =
        player.points || 0;

      break;

    case "WIN_RATE":

    case "WIN_RATE_AFTER_50":

      current =
        player.career?.winRate || 0;

      break;

    case "ELO":

      current =
        player.elo || 0;

      break;

    case "CURRENT_RANK":

      current =
        player.rank
          ? (
              leagueData.players.length
              - player.rank
              + 1
            )
          : 0;

      break;

    case "BEST_RANK":

      current =
        player.bestRank ||
        player.rank ||
        0;

      break;

    case "TOTAL_ACHIEVEMENTS":

    case "ACHIEVEMENTS":

      current =
        player.achievements?.length || 0;

      break;

    case "MATCH_STREAK":

    case "UNBEATEN_STREAK":

      current =
        player.bestStreak || 0;

      break;

    case "LOSS_STREAK":

      current =
        player.worstStreak || 0;

      break;

    case "ELIMINATIONS":

      current =
        player.eliminations || 0;

      break;

    case "TOP_PLAYER_WINS":

      current =
        player.topPlayerWins || 0;

      break;

    case "ELIMINATE_TOP_PLAYER":

      current =
        player.topPlayerElims || 0;

      break;

    case "SAME_PLAYER_WINS":

      current =
        player.samePlayerWinStreak || 0;

      break;

    case "RIVAL_WINS":

      current =
        player.rivalWins || 0;

      break;

    case "HIGH_STAKE_MATCHES":

      current =
        player.highStakeMatches || 0;

      break;

    case "SINGLE_MATCH_STAKE":

      current =
        player.highestStakeWin || 0;

      break;

    case "ACTIVE_SEASONS":

      current =
        player.activeSeasons || 0;

      break;

    case "SEASONS_WON":

      current =
        player.seasonsWon || 0;

      break;

    case "TIER_REACHED":

      const tier =
        String(player.tier || "")
          .toUpperCase();

      const targetTier =
        String(target || "")
          .toUpperCase();

      const tierOrder = {

        BRONZE:1,
        SILVER:2,
        GOLD:3

      };

      current =
        (tierOrder[tier] || 0) >=
        (tierOrder[targetTier] || 0)

          ? 1
          : 0;

      break;

    case "RANK_CLIMB":

      current =
        player.biggestRankClimb || 0;

      break;

    case "RANK_DROP":

      current =
        player.biggestRankDrop || 0;

      break;

    case "MOST_MATCHES_SEASON":

      current =
        player.games || 0;

      break;

    case "MOST_ELIMS_SEASON":

      current =
        player.eliminations || 0;

      break;

    case "SEASON_MVP":

      current =
        player.mvpAwards || 0;

      break;

    case "FIRST_SEASON_TOP3":

      current =
        player.firstSeasonTop3
          ? 1
          : 0;

      break;

    case "TOP3_FULL_SEASON":

      current =
        player.top3FullSeason
          ? 1
          : 0;

      break;

    case "PERFECT_SEASON":

      current =
        player.perfectSeason
          ? 1
          : 0;

      break;

    case "FINAL_SURVIVOR":

      current =
        player.finalSurvivor
          ? 1
          : 0;

      break;

    case "ALL_HIDDEN_UNLOCKED":

      current =
        player.hiddenAchievementsUnlocked || 0;

      break;

    default:

      current = 0;

  }

  /* =========================
     SECONDARY CRITERIA
  ========================= */

  switch(secondaryType){

    case "CAREER_GAMES":

      secondaryCurrent =
        player.career?.games || 0;

      break;

    case "SEASON_GAMES":

      secondaryCurrent =
        player.games || 0;

      break;

    case "CAREER_WINS":

      secondaryCurrent =
        player.career?.wins || 0;

      break;

    default:

      secondaryCurrent =
        secondaryTarget;

  }

  /* =========================
     SECONDARY REQUIREMENT
  ========================= */

  const secondaryMet =

    secondaryCurrent >=
    secondaryTarget;

  /* =========================
     FINAL %
  ========================= */

  const percent =

    secondaryMet

      ?

      Math.min(
        100,
        Math.round(
          (current / target) * 100
        )
      )

      :

      0;

  return {

    current,

    target,

    secondaryCurrent,

    secondaryTarget,

    secondaryMet,

    percent

  };

}





function animateCountUps(){

  const counters =
    document.querySelectorAll('.count-up');

  counters.forEach(counter => {

    const target =
      Number(
        counter.textContent
          .replace(/[^0-9]/g,'')
      );

    if(isNaN(target)) return;

    let current = 0;

    const increment =
      Math.max(
        1,
        Math.ceil(target / 40)
      );

    counter.textContent = '0';

    const timer = setInterval(() => {

      current += increment;

      if(current >= target){

        counter.textContent = target;

        clearInterval(timer);

      }else{

        counter.textContent = current;

      }

    }, 18);

  });

}



function pulseLeaderboardMovements(){

  document
    .querySelectorAll(
      '.move-up,.move-down'
    )
    .forEach(el => {

      el.animate(

        [
          {
            transform:'scale(1)'
          },
          {
            transform:'scale(1.06)'
          },
          {
            transform:'scale(1)'
          }
        ],

        {
          duration:1800,
          iterations:1
        }

      );

    });

}
